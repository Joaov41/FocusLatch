name: FocusLatch
options:
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "13.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.codex.focuslatch.downloads
    DEVELOPMENT_TEAM: HNG8WV554B
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: Xcode/FocusLatch-Info.plist
    CLANG_ENABLE_MODULES: YES
    ENABLE_HARDENED_RUNTIME: YES
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    LD_RUNPATH_SEARCH_PATHS:
      - "$(inherited)"
      - "@executable_path/../Frameworks"
    HEADER_SEARCH_PATHS:
      - "$(SRCROOT)/Sources/MultitouchBridge/include"
    SWIFT_INCLUDE_PATHS:
      - "$(SRCROOT)/Sources/MultitouchBridge/include"
targets:
  FocusLatch:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Sources/FocusLatch
      - path: Sources/MultitouchBridge/MultitouchBridge.c
      - path: Xcode/Assets.xcassets
    settings:
      base:
        PRODUCT_NAME: FocusLatch
        PRODUCT_BUNDLE_IDENTIFIER: com.codex.focuslatch.downloads
        INFOPLIST_FILE: Xcode/FocusLatch-Info.plist
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      gatherCoverageData: false
